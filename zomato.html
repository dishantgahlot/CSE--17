<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato E-commerce</title>

   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="zomato.css">
</head>
<body>

<header class="hometab">

    <div class="main">

        <div class="d1">
            <h1>ZOMATO</h1>
        </div>

        <div class="d2">
            <div id="input">

                <i class="fa-solid fa-location-dot location-icon"></i>
                <input  id="dish1"    type="text" placeholder="Delhi NCR">

              
               <div class="divider"></div>

              
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input  id="dish"   type="text" placeholder="Search for restaurant, cuisine or a dish">

            </div>
        </div>

        <div class="buttons">
            <button id="btn1">Log in</button>
            <button id="btn2">Sign Up</button>
        </div>

    </div>

</header>

</body>
</html>
