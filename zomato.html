<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato E-commerce</title>

   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="zomato.css">
</head>
<body>

<header class="hometab">

    <div class="main">

        <div class="d1">
            <h1>ZOMATO</h1>
        </div>

        <div class="d2">
            <div id="input">

                <i class="fa-solid fa-location-dot location-icon"></i>
                <input  id="dish1"    type="text" placeholder="Delhi NCR">

              
               <div class="divider"></div>

              
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input  id="dish"   type="text" placeholder="Search for restaurant, cuisine or a dish">

            </div>
        </div>

        <div class="buttons">
            <button id="btn1">Log in</button>
            <button id="btn2">Sign Up</button>
        </div>

    </div>

</header>

<div class="body1">

    <div class="di1">Home</div>
    <span>/</span>
    <div class="di2">India</div>
    <span>/</span>
    <div class="di3">Delhi NCR restaurants</div>

</div>

<div class="body2">

<div class="fil">Filters</div>
<div class="veg">Pure Veg</div>
<div class="cous">Cousines</div>

</div>

<div class="body3">

    <div>
        <h2 class="ins">Inspiration for your first order</h2>
    </div>

    <div class="img">

        <div class="img1">
            <img src="pizza.avif">


        </div>

        <div class="img2">
            <img src="burger.avif">
        </div>

      
        <div class="img3">
            <img src="cake.avif">
        </div>

        
        <div class="img4">
            <img src="biryani.avif">
        </div>

        
        <div class="img5">
            <img src="chicken.avif">
        </div>

        
        <div class="img6">
            <img src="thali.avif">
        </div>

    </div>






</div>

</body>
</html>
